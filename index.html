<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bonjourblowup | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">
  <div class="entry-overlay is-hidden" id="entryOverlay" aria-hidden="true">
    <div class="entry-overlay__panel">
      <div class="entry-overlay__image-stack" aria-hidden="true">
        <img src="images/entershop.jpg" alt="" class="entry-overlay__image entry-overlay__image--ghost-a" />
        <img src="images/entershop.jpg" alt="" class="entry-overlay__image entry-overlay__image--ghost-b" />
        <img src="images/entershop.jpg" alt="" class="entry-overlay__image entry-overlay__image--ghost-c" />
        <img src="images/entershop.jpg" alt="bonjourblowup storefront entrance" class="entry-overlay__image entry-overlay__image--main" />
      </div>
      <button class="btn btn--solid entry-overlay__button" id="entryOverlayButton">Enter Shop</button>
    </div>
  </div>

  <!-- Global noise and paint texture overlays -->
  <div class="texture-layer texture-layer--noise" aria-hidden="true"></div>
  <div class="texture-layer texture-layer--paint" aria-hidden="true"></div>

  <!-- Premium minimal navigation -->
  <header class="site-header">
    <a href="index.html" class="brand-mark">bonjourblowup</a>
    <button class="menu-toggle" aria-expanded="false" aria-label="Toggle menu">☰</button>
    <nav class="site-nav">
      <a href="shop.html">Shop</a>
      <a href="gallery.html">Gallery</a>
      <a href="wall.html">Wall</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <!-- Immersive hero section -->
    <section class="hero">
      <div class="hero-art hero-art--left" aria-hidden="true">
        <img src="images/bonjour-1.png" alt="" />
      </div>
      <div class="hero-art hero-art--right" aria-hidden="true">
        <img src="images/bonjour-2.png" alt="" />
      </div>

      <div class="hero-content">
        <h1 class="hero-title">bonjourblowup</h1>
        <div class="cta-row">
          <a class="btn btn--solid" href="shop.html">Enter Shop</a>
          <a class="btn btn--outline" href="gallery.html">Gallery</a>
          <a class="btn btn--ghost" href="wall.html">Leave Your Mark</a>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
