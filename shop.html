<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bonjourblowup | Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="texture-layer texture-layer--noise" aria-hidden="true"></div>
  <div class="texture-layer texture-layer--paint" aria-hidden="true"></div>

  <header class="site-header">
    <a href="index.html" class="brand-mark">bonjourblowup</a>
    <button class="menu-toggle" aria-expanded="false" aria-label="Toggle menu">☰</button>
    <nav class="site-nav">
      <a href="shop.html" class="active">Shop</a>
      <a href="gallery.html">Gallery</a>
      <a href="wall.html">Wall</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="inner-page shop-page">
    <section class="france-flag-shop" aria-label="Shirt placeholders">
      <article class="shirt-placeholder">
        <p class="shirt-badge">New Drop</p>
        <div class="shirt-silhouette" aria-hidden="true"></div>
        <h2>Paris Fade Tee</h2>
        <p class="shirt-price">$42.00</p>
        <button class="shirt-cta" type="button">Add to cart</button>
      </article>
      <article class="shirt-placeholder">
        <p class="shirt-badge">Limited</p>
        <div class="shirt-silhouette" aria-hidden="true"></div>
        <h2>Midnight Bonjour Tee</h2>
        <p class="shirt-price">$46.00</p>
        <button class="shirt-cta" type="button">Add to cart</button>
      </article>
      <article class="shirt-placeholder">
        <p class="shirt-badge">Core</p>
        <div class="shirt-silhouette" aria-hidden="true"></div>
        <h2>Tricolor Drift Tee</h2>
        <p class="shirt-price">$39.00</p>
        <button class="shirt-cta" type="button">Add to cart</button>
      </article>
      <article class="shirt-placeholder">
        <p class="shirt-badge">Pre-Order</p>
        <div class="shirt-silhouette" aria-hidden="true"></div>
        <h2>Studio Street Tee</h2>
        <p class="shirt-price">$44.00</p>
        <button class="shirt-cta" type="button">Add to cart</button>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
